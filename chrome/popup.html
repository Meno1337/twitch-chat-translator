<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 230px; padding: 12px; font-family: 'Segoe UI', Tahoma, sans-serif; background: #18181b; color: #efeff1; }
        .section { margin-bottom: 12px; border-bottom: 1px solid #35353b; padding-bottom: 10px; }
        label { display: block; font-size: 11px; margin-bottom: 5px; color: #adadb8; text-transform: uppercase; letter-spacing: 0.5px; }
        
        select, input[type="color"] { 
            width: 100%; background: #0e0e10; color: white; 
            border: 1px solid #464649; border-radius: 4px; 
            padding: 6px; cursor: pointer; transition: border 0.2s;
        }
        select:focus, input[type="color"]:hover { border-color: #9147ff; outline: none; }

        /* Плашка с предупреждением об обновлении */
        .refresh-notice {
            background: rgba(145, 71, 255, 0.15);
            border: 1px solid #9147ff;
            color: #bf94ff;
            font-size: 11px;
            padding: 8px;
            border-radius: 4px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info { font-size: 11px; color: #adadb8; line-height: 1.4; margin-top: 10px; }
        .warning-text { color: #eb0400; font-weight: bold; font-size: 10px; margin-top: 5px; }
        h4 { margin: 0 0 12px 0; color: #efeff1; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        h4::before { content: "🌐"; }
    </style>
</head>
<body>
    <h4>Twitch Translator</h4>
    
    <div class="section">
        <label>Язык перевода</label>
        <select id="langSelect">
            <option value="ru">Русский (Russian)</option>
            <option value="en">English</option>
            <option value="de">Deutsch (German)</option>
            <option value="fr">Français (French)</option>
            <option value="es">Español (Spanish)</option>
        </select>
        
        <div class="refresh-notice">
            <span>ℹ️</span>
            <span>После смены языка <b>обновите страницу</b> стрима (F5)</span>
        </div>
    </div>

    <div class="section">
        <label>Цвет текста</label>
        <input type="color" id="colorPicker" value="#00e6cb">
    </div>

    <div class="info">
        <b>Движок:</b> Google Translate<br>
        <b>Режим:</b> Автоопределение &rarr; Выбранный<br>
        <div class="warning-text">⚠️ Перевод может быть неточным</div>
        <div style="margin-top: 10px; font-size: 10px; color: #adadb8; line-height: 1.3;">
            GitHub:
            <a href="https://github.com/Meno1337/twitch-chat-translator" target="_blank" rel="noopener noreferrer">
                Meno1337/twitch-chat-translator
            </a>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
